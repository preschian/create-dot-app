name: Package Manager

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for template changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            next:
              - 'templates/next/**'

      - name: Set matrix based on changes
        id: set-matrix
        run: |
          CHANGED_TEMPLATES='${{ steps.filter.outputs.changes }}'
          echo "Changed templates: $CHANGED_TEMPLATES"

          # Generate matrix for all changed templates with multiple package managers
          MATRIX=$(echo "$CHANGED_TEMPLATES" | jq -c '
            if . == [] then
              {"include": []}
            else
              {"include": [
                (.[] as $template |
                  ["npm"] | .[] as $pm |
                  {"template": $template, "working-directory": "templates/\($template)", "package-manager": $pm}
                )
              ]}
            end
          ' || echo '{"include": []}')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  node:
    needs: changes
    if: ${{ needs.changes.outputs.matrix != '' && fromJSON(needs.changes.outputs.matrix).include[0] }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.package-manager }} install

      - name: Compile contracts
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.package-manager }} run compile:contracts

      - name: Test contracts
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.package-manager }} run test:contracts

      - name: Lint code
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.package-manager }} run lint

      - name: Build project
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.package-manager }} run build
