name: Playwright Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'tests/**'
      - 'playwright.config.ts'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'tests/**'
      - 'playwright.config.ts'
      - '.github/workflows/playwright.yml'
  workflow_dispatch:

jobs:
  playwright:
    name: E2E
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Download wallet extensions
        run: bun run test:prepare

      # MetaMask runs as a browser extension, which requires headed Chromium.
      # Xvfb provides a virtual display so the headed browser can run on CI.
      - name: Run Playwright tests
        run: xvfb-run --auto-servernum -- bun run test
        env:
          CI: 'true'

      - name: Upload Playwright report (on failure)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
